<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>dock</title>
<link rel="stylesheet" href="../shared/glass.css">
<link rel="stylesheet" href="style.css"></head>
<body>
  <div class="glass-card">
    <div class="dock-row">
      <!-- Left: start button -->
      <div class="dock-section dock-left" id="dock-left"></div>

      <!-- Center: pinned + running, scrolls horizontally on overflow -->
      <div class="dock-section dock-center" id="dock-center"></div>

      <!-- Right: tray status chips + HUD toggle -->
      <div class="dock-section dock-right">
        <div class="tray" id="tray">
          <!-- Media chip — album art + prev/play/next controls. Shows the
               currently-playing source's artwork (Spotify cover, browser
               tab favicon, video keyframe). Hidden when nothing is playing. -->
          <div class="tray-media" id="tray-media" hidden>
            <button class="tray-media-prev" id="tray-media-prev" title="Previous">
              <svg viewBox="0 0 16 16" width="12" height="12" aria-hidden="true">
                <path d="M11 3 L5 8 L11 13 Z M4 3 L4 13" fill="currentColor" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="tray-media-art" id="tray-media-art" title="Play / pause">
              <img id="tray-media-img" alt="">
              <span class="tray-media-fallback" id="tray-media-fallback">♪</span>
              <span class="tray-media-overlay" id="tray-media-overlay">▶</span>
            </button>
            <button class="tray-media-next" id="tray-media-next" title="Next">
              <svg viewBox="0 0 16 16" width="12" height="12" aria-hidden="true">
                <path d="M5 3 L11 8 L5 13 Z M12 3 L12 13" fill="currentColor" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="tray-chip lang-chip" id="tray-lang" title="Keyboard layout" hidden>
            <span class="tray-val" id="tray-lang-val">EN</span>
          </div>
          <div class="tray-chip net-chip" id="tray-net" title="Network">
            <span class="tray-icon" id="tray-net-icon">●</span>
          </div>
          <div class="tray-chip vol-chip" id="tray-vol" title="Volume / output device">
            <span class="tray-icon" id="tray-vol-icon">🔊</span>
            <span class="tray-val" id="tray-vol-val">--%</span>
          </div>
          <div class="tray-chip mic-chip" id="tray-mic" title="Input device" hidden>
            <span class="tray-icon">🎤</span>
          </div>
          <button class="tray-chip voice-chip" id="voice-mic"
                  data-state="loading"
                  title="Voice dictation (click to toggle)">
            <svg class="voice-icon" viewBox="0 0 24 24" width="18" height="18"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9"  y="2"  width="6" height="12" rx="3"/>
              <path d="M5 11a7 7 0 0 0 14 0"/>
              <line x1="12" y1="18" x2="12" y2="22"/>
            </svg>
            <span class="voice-dot" aria-hidden="true"></span>
          </button>
          <div class="tray-chip clock-chip" id="tray-clock" title="Clock">
            <span id="tray-time">--:--</span>
          </div>
        </div>
        <div class="dock-divider"></div>
        <div id="dock-hud-toggle"></div>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body></html>
