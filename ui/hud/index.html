<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>hud</title>
<link rel="stylesheet" href="../shared/glass.css">
<link rel="stylesheet" href="style.css"></head>
<body>
  <div class="glass-card hud" id="hud">
    <div class="hud-scroll">
      <!-- Clock + date — the primary anchor for the HUD -->
      <section class="block clock-block">
        <div class="time" id="time">--:--</div>
        <div class="date" id="date">--</div>
      </section>

      <!-- Weather card — location is configurable via Settings → Weather city. -->
      <section class="block weather-block" id="weather-block">
        <div class="weather-icon" id="wx-icon">·</div>
        <div class="weather-meta">
          <div class="weather-temp" id="wx-temp">--°</div>
          <div class="weather-sub">
            <span id="wx-cond">…</span>
            <span class="weather-loc" id="wx-loc">Set a city</span>
          </div>
        </div>
      </section>

      <!-- Stats chips: CPU, RAM, Battery -->
      <section class="chips-row">
        <div class="chip" id="cpu-chip" title="CPU usage">
          <div class="chip-label">CPU</div>
          <div class="chip-value" id="cpu-val">--%</div>
          <div class="chip-bar"><div class="chip-bar-fill" id="cpu-bar"></div></div>
        </div>
        <div class="chip" id="ram-chip" title="RAM usage">
          <div class="chip-label">RAM</div>
          <div class="chip-value" id="ram-val">--%</div>
          <div class="chip-bar"><div class="chip-bar-fill" id="ram-bar"></div></div>
        </div>
      </section>

      <!-- Network: online dot + ping + rates -->
      <section class="block net-block">
        <div class="net-status">
          <span class="status-dot" id="net-dot"></span>
          <span class="status-text" id="net-text">Checking…</span>
          <span class="status-ping" id="net-ping"></span>
        </div>
        <div class="net-rates">
          <div class="net-line"><span class="arrow down">↓</span><span id="down">0 KB/s</span></div>
          <div class="net-line"><span class="arrow up">↑</span><span id="up">0 KB/s</span></div>
        </div>
      </section>

      <!-- Audio + media -->
      <section class="block audio-block">
        <div class="audio-line">
          <button class="vol-icon" id="vol-icon" title="Mute / unmute">🔊</button>
          <input type="range" id="vol-slider" min="0" max="100" value="50">
          <span class="vol-pct" id="vol-pct">--%</span>
        </div>
        <div class="media-row" id="media-row">
          <div class="media-meta">
            <div class="title" id="media-title">Nothing playing</div>
            <div class="artist" id="media-artist"></div>
          </div>
          <div class="media-controls">
            <button class="media-btn" id="media-prev" title="Previous">⏮</button>
            <button class="media-btn play" id="media-play" title="Play / pause">▶</button>
            <button class="media-btn" id="media-next" title="Next">⏭</button>
          </div>
        </div>
      </section>

      <!-- Quick toggles row → Windows Settings deep links + actions.
           Each button is an inline SVG drawn with currentColor so the WARP
           status tint and any future hover/active styles apply uniformly. -->
      <section class="quick-row">
        <button class="quick-btn" data-uri="ms-settings:network-wifi" title="Wi-Fi settings">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M3 9.5 a13 13 0 0 1 18 0"/>
            <path d="M6.5 13 a8 8 0 0 1 11 0"/>
            <path d="M10 16.5 a3.5 3.5 0 0 1 4 0"/>
            <circle cx="12" cy="19.5" r="1.2" fill="currentColor" stroke="none"/>
          </svg>
        </button>
        <button class="quick-btn" data-uri="ms-settings:bluetooth" title="Bluetooth settings">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 7 L16 17 L12 21 L12 3 L16 7 L8 17"/>
          </svg>
        </button>
        <button class="quick-btn" data-uri="ms-settings:quiethours" title="Focus mode">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M20.5 14.5 a8 8 0 1 1 -11 -11 a6 6 0 0 0 11 11 z"
                  fill="currentColor" fill-opacity="0.18"
                  stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="quick-btn" data-uri="ms-settings:display" title="Display settings">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <rect x="3" y="4.5" width="18" height="12.5" rx="1.8"/>
            <line x1="9" y1="20" x2="15" y2="20"/>
            <line x1="12" y1="17" x2="12" y2="20"/>
          </svg>
        </button>
        <button class="quick-btn" data-action="minimize-all" title="Minimize all windows">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-linecap="round">
            <rect x="6" y="4.5" width="12" height="9" rx="1.4" stroke-width="1.4" opacity="0.45"/>
            <line x1="5" y1="18.5" x2="19" y2="18.5" stroke-width="2.2"/>
          </svg>
        </button>
        <button class="quick-btn warp-btn" id="warp-btn" data-status="unknown"
                title="Cloudflare WARP — click to toggle, right-click to open">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M7 17 a4.2 4.2 0 0 1 0 -8.4 a5 5 0 0 1 9.6 0.8 a3.6 3.6 0 0 1 0.4 7.6 z"
                  fill="currentColor" fill-opacity="0.18"
                  stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="quick-btn" data-uri="ms-settings:" title="All Settings">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <line x1="4" y1="7"  x2="20" y2="7"  stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
            <circle cx="16" cy="7"  r="2.4" fill="#5cb6ff"/>
            <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
            <circle cx="8"  cy="12" r="2.4" fill="#5cb6ff"/>
            <line x1="4" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
            <circle cx="18" cy="17" r="2.4" fill="#5cb6ff"/>
          </svg>
        </button>
      </section>

      <!-- Power menu — system actions. Restart / sign out / shut down are
           armed on first click and only fire on the second confirm tap. -->
      <section class="block power-block">
        <button class="apps-header" id="power-toggle" aria-expanded="false">
          <span>Power</span>
          <span class="apps-caret" id="power-caret">▸</span>
        </button>
        <div class="power-grid collapsed" id="power-grid">
          <button class="power-btn" data-power-action="lock"    data-power-label="Lock">Lock</button>
          <button class="power-btn" data-power-action="sleep"   data-power-label="Sleep">Sleep</button>
          <button class="power-btn" data-power-action="signout" data-power-label="Sign out">Sign out</button>
          <button class="power-btn" data-power-action="restart" data-power-label="Restart">Restart</button>
          <button class="power-btn power-btn-danger" data-power-action="shutdown" data-power-label="Shut down">Shut down</button>
        </div>
      </section>

      <!-- Files stash — drop files in, drag them back out elsewhere -->
      <section class="block stash-block" id="stash-block">
        <button class="apps-header" id="stash-toggle" aria-expanded="true">
          <span id="stash-label">Files</span>
          <span class="apps-caret" id="stash-caret">▾</span>
        </button>
        <div class="stash-body" id="stash-body">
          <div class="stash-dropzone" id="stash-dropzone">
            <span class="stash-hint">Drop files here · drag back out anywhere</span>
          </div>
          <div class="stash-list" id="stash-list"></div>
        </div>
      </section>

      <!-- Settings — collapsible -->
      <section class="block settings-block">
        <button class="apps-header" id="settings-toggle" aria-expanded="false">
          <span>Settings</span>
          <span class="apps-caret" id="settings-caret">▸</span>
        </button>
        <div class="settings-list collapsed" id="settings-list">
          <label class="settings-row">
            <input type="checkbox" id="set-autostart">
            <span>Launch at sign-in</span>
          </label>
          <div class="settings-row settings-city-row">
            <span>Weather city</span>
            <span class="settings-city-current" id="settings-city-current">not set</span>
          </div>
          <div class="city-picker">
            <input type="text" id="city-search" placeholder="Search city…" autocomplete="off" spellcheck="false">
            <ul class="city-results" id="city-results"></ul>
          </div>
        </div>
      </section>

      <!-- Background apps — collapsible, defaults open -->
      <section class="block apps-block">
        <button class="apps-header" id="apps-toggle" aria-expanded="true">
          <span id="apps-label">Background apps</span>
          <span class="apps-caret" id="apps-caret">▾</span>
        </button>
        <div class="apps-list" id="apps-list"></div>
      </section>
    </div>

    <div class="drag-handle" id="drag"></div>
    <div class="toast" id="toast"></div>
  </div>
  <script type="module" src="app.js"></script>
</body></html>
