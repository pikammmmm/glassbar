<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>spotlight</title>
<link rel="stylesheet" href="../shared/glass.css">
<link rel="stylesheet" href="style.css"></head>
<body>
  <div class="glass-card spotlight-card">
    <div class="spotlight-input-row">
      <span class="spotlight-glyph">⌕</span>
      <input id="q" type="text" autocomplete="off" autocorrect="off"
             spellcheck="false" placeholder="Search apps and files…" />
      <span class="spotlight-hint">↵ launch · esc close</span>
    </div>
    <ul id="results" class="spotlight-results"></ul>
  </div>
  <script type="module" src="../shared/theme.js"></script>
  <script type="module" src="app.js"></script>
</body></html>
